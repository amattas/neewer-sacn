name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install black ruff mypy bandit pip-audit vulture

      - name: Run tests
        run: pytest -v

      - name: Check formatting (black)
        run: black --check src/

      - name: Lint (ruff)
        run: ruff check src/

      - name: Dead code check (vulture)
        run: vulture src/ --min-confidence 80 || true

      - name: Type check (mypy)
        run: mypy src/ || true

      - name: Security scan (bandit)
        run: bandit -r src/

      - name: Dependency audit
        run: pip-audit || true
